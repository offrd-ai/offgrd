<style>
  :root{--navy:#13294B;--carolina:#7BAFD4;--ink:#16181d;--line:#e2e5ea;--muted:#6b7280;--ok:#1d7a45;--bad:#b3261e;}
  *{box-sizing:border-box}
  body{margin:0;font:15px/1.5 -apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--ink);background:#eef1f5;padding:14px}
  .wrap{max-width:960px;margin:0 auto}
  .topbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}

  .btn{border:1px solid #d7dbe2;background:#fff;color:#16181d;padding:10px 15px;border-radius:10px;font-weight:800;font-size:14px;cursor:pointer}

  .fb.bad{background:#fdeceb;border:1px solid #f3c4c0}

  .prog{color:var(--muted);font-size:13px;margin-top:6px}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .score{font-size:15px;font-weight:800}
  .rev{border-bottom:1px solid #eef0f3;padding:8px 0;display:flex;gap:10px;align-items:center;font-size:14px}

  .cbtn{border:1px solid #e2e5ea;background:#fff;color:#16181d;padding:6px 10px;border-radius:8px;font-weight:800;font-size:12px;cursor:pointer;margin-left:2px}

<script>
/* ===================== OFFGRD Reps Lab ===================== */
const W=1000,H=600,LOS=360;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

/* route offsets (x lateral, y downfield-negative), d: N straight, S to sideline, M to middle */
const PPY=11;              /* pixels per yard (depth + lateral) */
/* routes as break points in YARDS: dep = depth downfield from LOS, lat = lateral yards
   (+ = toward the nearest sideline, - = toward the middle). Built to true depths. */
const ROUTES={
 Hitch:[{lat:0,dep:6},{lat:0,dep:5}],
 Slant:[{lat:-1,dep:1.5},{lat:-9,dep:6}],
 Out:[{lat:0,dep:10},{lat:9,dep:10}],
 Corner:[{lat:0,dep:10},{lat:9,dep:18}],
 Post:[{lat:0,dep:10},{lat:-9,dep:18}],
 Go:[{lat:0,dep:22}],
 Seam:[{lat:-1,dep:20}],
 Dig:[{lat:0,dep:12},{lat:-16,dep:12}],
 Curl:[{lat:0,dep:12},{lat:1,dep:10}],
 Comeback:[{lat:0,dep:14},{lat:4,dep:12}],
 Flat:[{lat:6,dep:1},{lat:11,dep:3}],
 Stick:[{lat:0,dep:6},{lat:5,dep:5}],
 Cross:[{lat:-6,dep:3},{lat:-24,dep:6}]
};
function buildRoute(sx,sy,name){
  const R=ROUTES[name]||[]; const side=sx<500?-1:1;
  const pts=[{x:sx,y:sy}];
  R.forEach(o=>{ pts.push({ x:clamp(sx + o.lat*PPY*side, 24, 976), y: LOS - o.dep*PPY }); });
  return pts;
}
const ON=LOS, OFF=LOS+12;   /* on-ball vs 1-yd off-ball alignment */
const OL=[{x:404},{x:452},{x:500},{x:548},{x:596}];
const CONCEPTS=[
 { id:"smash", name:"Smash", form:"Trips Rt",
   recv:[{lab:"X",x:120,y:ON,route:"Hitch"},{lab:"Y",x:700,y:ON,route:"Seam"},{lab:"H",x:800,y:OFF,route:"Hitch"},{lab:"Z",x:892,y:ON,route:"Corner"}],
   back:{lab:"RB",x:455,y:465,route:"Flat"}, prog:["Z","H","X","RB"],
   reads:{
     "Cover 0":{t:"H",why:"All-out man, no deep help — throw the quick hitch (5-6) before the rush gets home."},
     "Cover 1":{t:"Z",why:"Single-high man — win the corner one-on-one over the sinking corner."},
     "Cover 2":{t:"Z",why:"Classic Smash beater: high-low the corner. He jams the flat, safety's deep — the corner sits in the hole."},
     "Cover 3":{t:"H",why:"The corner is roofed by the deep third — take the 6-yard hitch underneath now."},
     "Cover 4":{t:"H",why:"Quarters brackets the corner — the hitch underneath is the completion."},
     "Tampa 2":{t:"Z",why:"Corners squat, Mike runs the deep middle — drop the corner over the squatting flat."} } },

 { id:"mesh", name:"Mesh", form:"2x2",
   recv:[{lab:"H",x:330,y:OFF,route:"Cross"},{lab:"Y",x:670,y:OFF,route:"Cross"},{lab:"X",x:130,y:ON,route:"Dig"},{lab:"Z",x:880,y:ON,route:"Corner"}],
   back:{lab:"RB",x:545,y:465,route:"Flat"}, prog:["H","Y","X","RB"],
   reads:{
     "Cover 0":{t:"H",why:"Man pressure — the mesh rub springs a crosser; hit the first one (5-6 yds) coming off the pick."},
     "Cover 1":{t:"Y",why:"Man-free — take the crosser coming off the rub with grass to run."},
     "Cover 2":{t:"H",why:"Zone — throw the crosser as it settles in the hook window at 5-6, under the halves."},
     "Cover 3":{t:"H",why:"Find the crosser sitting in the middle window versus three-deep."},
     "Cover 4":{t:"Y",why:"Quarters — the crossers cross the underneath zones; take the first one in space."},
     "Tampa 2":{t:"H",why:"Mike carries the middle deep — sit the crosser underneath him at 5-6."} } },

 { id:"flood", name:"Flood", form:"Trips Rt",
   recv:[{lab:"Y",x:700,y:ON,route:"Go"},{lab:"H",x:800,y:OFF,route:"Out"},{lab:"Z",x:892,y:ON,route:"Flat"},{lab:"X",x:120,y:ON,route:"Comeback"}],
   back:{lab:"RB",x:455,y:465,route:"Flat"}, prog:["H","Z","X","RB"],
   reads:{
     "Cover 0":{t:"Z",why:"Man — the 3-yard flat with the most grass and leverage, quick."},
     "Cover 1":{t:"H",why:"Man — the 10-yard out on leverage away from the free safety."},
     "Cover 2":{t:"H",why:"High-low the flat defender: he sits on the 3-yard flat, so throw the 10-12 out behind him."},
     "Cover 3":{t:"H",why:"Three-level flood: flat at 3 pulls the flat defender, the out sits in the void at 10-12."},
     "Cover 4":{t:"Z",why:"Quarters sinks the corner — dump the 3-yard flat underneath for the easy completion."},
     "Tampa 2":{t:"H",why:"Corner squats the flat — throw the out over him at 10-12, under the half."} } },

 { id:"verts", name:"Four Verts", form:"2x2",
   recv:[{lab:"X",x:120,y:ON,route:"Go"},{lab:"H",x:330,y:OFF,route:"Seam"},{lab:"Y",x:670,y:OFF,route:"Seam"},{lab:"Z",x:880,y:ON,route:"Go"}],
   back:{lab:"RB",x:500,y:470,route:"Flat"}, prog:["H","Y","X","RB"],
   reads:{
     "Cover 0":{t:"H",why:"No deep help — throw the seam (20+) on your fastest matchup immediately."},
     "Cover 1":{t:"X",why:"Single-high man — attack the outside vertical away from the free safety."},
     "Cover 2":{t:"H",why:"Bend the seam on the safety — hit it 20+ over the corner, under the safety."},
     "Cover 3":{t:"H",why:"Attack the seam versus single-high — throw it in the void between corner and safety."},
     "Cover 4":{t:"RB",why:"Quarters caps all four verticals — check it down / hitch it up underneath."},
     "Tampa 2":{t:"X",why:"Mike runs the middle — take the outside vertical on the deep-half corner."} } },

 { id:"stick", name:"Stick", form:"Trips Rt",
   recv:[{lab:"Y",x:700,y:ON,route:"Stick"},{lab:"H",x:800,y:OFF,route:"Go"},{lab:"Z",x:892,y:ON,route:"Go"},{lab:"X",x:120,y:ON,route:"Slant"}],
   back:{lab:"RB",x:455,y:465,route:"Flat"}, prog:["Y","RB","X"],
   reads:{
     "Cover 0":{t:"Y",why:"Beat man with the quick stick (5-6) breaking away from leverage."},
     "Cover 1":{t:"Y",why:"Man — stick away from the defender's leverage; quick and open at 5-6."},
     "Cover 2":{t:"Y",why:"The stick sits in the flat void at 5-6 inside the squatting corner."},
     "Cover 3":{t:"Y",why:"Underneath stick in the flat window versus the curl/flat defender."},
     "Cover 4":{t:"Y",why:"Quarters — the 5-yard stick is the easy pitch-and-catch."},
     "Tampa 2":{t:"Y",why:"Stick in front of the squatting corner at 5-6."} } },

 { id:"curlflat", name:"Curl-Flat", form:"2x2",
   recv:[{lab:"X",x:130,y:ON,route:"Curl"},{lab:"H",x:300,y:OFF,route:"Flat"},{lab:"Z",x:880,y:ON,route:"Curl"},{lab:"Y",x:700,y:OFF,route:"Flat"}],
   back:{lab:"RB",x:545,y:465,route:"Flat"}, prog:["X","H","Z"],
   reads:{
     "Cover 0":{t:"H",why:"Man pressure — the flat (3 yds, past the LOS) with leverage and grass, quick."},
     "Cover 1":{t:"X",why:"Man — the curl breaking back to you at 10-12, away from trailing coverage."},
     "Cover 2":{t:"X",why:"Curl settles in the hole at 10-12 under the half, inside the squat corner."},
     "Cover 3":{t:"H",why:"High-low the flat defender: he widened to the curl, so throw the flat at 3 past the LOS."},
     "Cover 4":{t:"H",why:"Quarters — the flat underneath the sinking corner is the completion."},
     "Tampa 2":{t:"X",why:"Curl in the void at 10-12 under the half, over the squatting corner."} } }
];
const COVERAGES=["Cover 0","Cover 1","Cover 2","Cover 3","Cover 4","Tampa 2"];

/* ---------- defense drawing ---------- */
function dot(x,y,lab,fill,r){ r=r||13; return `<circle cx="${x}" cy="${y}" r="${r}" fill="${fill}" stroke="#0b2e17" stroke-width="1.5"/>`+(lab?`<text x="${x}" y="${y+4}" font-size="12" font-weight="800" fill="#fff" text-anchor="middle">${lab}</text>`:""); }
function zone(x,y,rx,ry,lab){ return `<ellipse cx="${x}" cy="${y}" rx="${rx}" ry="${ry}" fill="rgba(255,255,255,.12)" stroke="rgba(255,255,255,.5)" stroke-width="1.5"/><text x="${x}" y="${y+4}" font-size="12" font-weight="800" fill="rgba(255,255,255,.85)" text-anchor="middle">${lab}</text>`; }
const DL="#c8963c", LB="#b8860b", DB="#123a6b";
function dline(los){ los=los||LOS; return [430,485,540,595].map((x)=>dot(x,los-16,"",DL,12)).join(""); }
function manDefs(recv,deep){
  let s=""; recv.forEach(p=>{ const dx=p.x+(p.x<500?14:-14), dy=p.y-26; s+=`<line x1="${dx}" y1="${dy}" x2="${p.x}" y2="${p.y}" stroke="rgba(255,255,255,.45)" stroke-width="1.5" stroke-dasharray="4 4"/>`+dot(dx,dy,"M",DB,11); });
  return s;
}
function uzone(x,y,rx,ry){ return `<ellipse cx="${x}" cy="${y}" rx="${rx}" ry="${ry}" fill="rgba(255,255,255,.07)" stroke="rgba(255,255,255,.32)" stroke-width="1.2" stroke-dasharray="5 4"/>`; }
function drawCoverage(cov,recv,los){
  los=los||LOS;
  let s=dline(los);
  if(cov==="Cover 0"){ s+=manDefs(recv); s+=dot(500,326,"B",LB,12)+`<path d="M500 316 L500 292" stroke="#e23b2e" stroke-width="4" stroke-linecap="round"/><path d="M493 300 L500 288 L507 300" fill="none" stroke="#e23b2e" stroke-width="4" stroke-linejoin="round"/>`; }
  else if(cov==="Cover 1"){ s+=manDefs(recv,true); s+=uzone(500,300,80,40)+dot(500,150,"FS",DB,13)+dot(500,300,"R",LB,12); }
  else if(cov==="Cover 2"){ s+=zone(300,150,120,60,"½")+zone(700,150,120,60,"½")+uzone(160,290,80,40)+uzone(840,290,80,40)+uzone(380,300,78,40)+uzone(500,300,78,40)+uzone(620,300,78,40)+dot(160,290,"F",DB,12)+dot(840,290,"F",DB,12)+dot(380,300,"H",LB,12)+dot(620,300,"H",LB,12)+dot(500,300,"M",LB,12); }
  else if(cov==="Cover 3"){ s+=zone(230,150,110,58,"⅓")+zone(500,140,110,58,"⅓")+zone(770,150,110,58,"⅓")+uzone(190,300,84,40)+uzone(810,300,84,40)+uzone(400,300,80,40)+uzone(600,300,80,40)+dot(190,300,"C",DB,12)+dot(810,300,"C",DB,12)+dot(400,300,"H",LB,12)+dot(600,300,"H",LB,12); }
  else if(cov==="Cover 4"){ s+=zone(180,150,95,55,"¼")+zone(400,148,95,55,"¼")+zone(600,148,95,55,"¼")+zone(820,150,95,55,"¼")+uzone(250,305,88,40)+uzone(500,305,88,40)+uzone(750,305,88,40)+dot(250,305,"C",LB,12)+dot(500,305,"H",LB,12)+dot(750,305,"C",LB,12); }
  else if(cov==="Tampa 2"){ s+=zone(300,150,115,58,"½")+zone(700,150,115,58,"½")+uzone(170,300,80,40)+uzone(830,300,80,40)+uzone(400,305,80,40)+uzone(600,305,80,40)+dot(500,205,"M",LB,13)+dot(170,300,"F",DB,12)+dot(830,300,"F",DB,12)+dot(400,305,"H",LB,12)+dot(600,305,"H",LB,12); }
  return s;
}

/* ---------- render a rep ---------- */
function renderBuiltin(rep, revealLab){
  const c=rep.concept;
  let s="";
  for(let y=40;y<=560;y+=52) s+=`<line x1="24" y1="${y}" x2="976" y2="${y}" stroke="rgba(255,255,255,.14)" stroke-width="1.5"/>`;
  s+=`<line x1="24" y1="${LOS}" x2="976" y2="${LOS}" stroke="#ffd24a" stroke-width="3"/>`;
  s+=drawCoverage(rep.coverage, c.recv);
  OL.forEach(o=>{ s+=`<rect x="${o.x-11}" y="${LOS-11}" width="22" height="22" rx="4" fill="#9aa4b2" stroke="#fff" stroke-width="1.5"/>`; });
  s+=dot(500,470,"QB",'#0e1f3a',13);
  const targets=c.recv.concat([c.back]);
  targets.forEach(p=>{
    if(!p) return;
    const pts=buildRoute(p.x,p.y,p.route); const end=pts[pts.length-1];
    const d="M "+pts.map(q=>q.x+" "+q.y).join(" L ");
    const isReveal=revealLab && p.lab===revealLab;
    s+=`<path d="${d}" fill="none" stroke="${isReveal?'#19c37d':'#bfe3ff'}" stroke-width="${isReveal?5:3.5}"/>`;
    s+=`<circle cx="${p.x}" cy="${p.y}" r="12" fill="#c8102e" stroke="#fff" stroke-width="2"/><text x="${p.x}" y="${p.y+4}" font-size="11" font-weight="800" fill="#fff" text-anchor="middle">${p.lab}</text>`;
    s+=`<g data-lab="${p.lab}" style="cursor:pointer"><circle cx="${end.x}" cy="${end.y}" r="19" fill="${isReveal?'rgba(25,195,125,.9)':'rgba(255,255,255,.18)'}" stroke="${isReveal?'#0b6b3f':'#ffffff'}" stroke-width="2.5"/><text x="${end.x}" y="${end.y+5}" font-size="14" font-weight="900" fill="#fff" text-anchor="middle">${p.lab}</text></g>`;
  });
  document.getElementById("field").innerHTML=s;
}

/* ---------- custom (coach-authored) plays ---------- */
let CUSTOM=[]; let SOURCE="builtin";
/* ---------- THIS WEEK (Phase B): tests scoped to the active week plan ---------- */
let WEEKPLAN=null, WEEKMODE=false, WEEKCOVS=[], WEEKSET={ids:new Set(),names:new Set()};
function buildWeekSet(){ WEEKSET={ids:new Set(),names:new Set()};
  if(!WEEKPLAN) return;
  (WEEKPLAN.buckets||[]).forEach(b=>{ (b.plays||[]).forEach(p=>{ if(p.id) WEEKSET.ids.add(String(p.id)); if(p.name) WEEKSET.names.add(String(p.name).toLowerCase()); }); });
}
function weekPlayMatch(p){ if(!WEEKPLAN) return true; return WEEKSET.ids.has(String(p.id)) || WEEKSET.names.has(String(p.name||"").toLowerCase()); }
function normCov(c){ c=String(c||"").toLowerCase(); if(!c) return null;
  if(c.indexOf("tampa")>=0) return "Tampa 2";
  const m=c.match(/[0-4]/); if(m) return "Cover "+m[0];
  return null;
}
function weekDue(){ if(!WEEKPLAN||!WEEKPLAN.game_date) return ""; const d=Math.ceil((new Date(WEEKPLAN.game_date+"T12:00:00")-Date.now())/86400000); if(isNaN(d)) return ""; if(d<0) return "played"; if(d===0) return "GAMEDAY"; return "due in "+d+" day"+(d===1?"":"s"); }
function renderWeekBar(){
  const el=document.getElementById("weekBar"); if(!el) return;
  if(!WEEKPLAN){ el.style.display="none"; return; }
  el.style.display="flex";
  const gd=WEEKPLAN.game_date||"", cd=weekDue();
  let myPos=""; try{ myPos=(localStorage.getItem("offgrd_pos")||"").toUpperCase(); }catch(e){}
  const canRoute={QB:1,WR:1,TE:1,RB:1,FB:1,OL:1,DL:1,DB:1,LB:1,S:1,CB:1};
  el.innerHTML='<b style="color:var(--navy)">This week vs '+esc(WEEKPLAN.opponent||"—")+'</b>'
    +'<span class="tag">'+(gd?("gameday "+esc(gd)):"no game date set")+(cd?(" · "+esc(cd)):"")+(WEEKCOVS.length?(' · they show: '+WEEKCOVS.slice(0,3).map(esc).join(", ")):"")+'</span>'
    +'<span style="flex:1"></span>'

function easeIO(t){ return t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2; }
function along(pts,frac){ if(!pts.length) return {x:0,y:0}; if(pts.length<2) return pts[0];
  let seg=[],tot=0; for(let i=1;i<pts.length;i++){const L=Math.hypot(pts[i].x-pts[i-1].x,pts[i].y-pts[i-1].y);seg.push(L);tot+=L;}
  if(tot===0)return pts[0]; let target=frac*tot,acc=0;
  for(let i=0;i<seg.length;i++){ if(acc+seg[i]>=target){const t=(target-acc)/seg[i];return{x:pts[i].x+(pts[i+1].x-pts[i].x)*t,y:pts[i].y+(pts[i+1].y-pts[i].y)*t};} acc+=seg[i]; }
  return pts[pts.length-1]; }

  (route||[]).forEach(a=>{ if(a.cx!=null){ for(let t=0.34;t<1.001;t+=0.33){ const u=1-t; pts.push({x:u*u*prev.x+2*u*t*a.cx+t*t*a.x, y:u*u*prev.y+2*u*t*a.cy+t*t*a.y}); } } else pts.push({x:a.x,y:a.y}); prev={x:a.x,y:a.y}; });

function coverageActors(cov, recv, los){
  const defs=[]; let shade="";
  const Z=(x,y,rx,ry,l)=>{ shade+=zone(x,y,rx,ry,l); };
  const U=(x,y,rx,ry)=>{ shade+=`<ellipse cx="${x}" cy="${y}" rx="${rx}" ry="${ry}" fill="rgba(255,255,255,.07)" stroke="rgba(255,255,255,.32)" stroke-width="1.2" stroke-dasharray="5 4"/>`; };
  const DLc="#c8963c", LB="#b8860b", DB="#123a6b", RED="#d9382c";
  const push=(fx,fy,lab,fill,kind,extra)=>defs.push(Object.assign({fx,fy,lab,fill,kind,r:(kind==="deep"?13:12)},extra||{}));
  [430,485,540,595].forEach(x=>push(x,los-16,"",DLc,"dl"));   /* 4-man rush */
  const nMan=recv.length;
  if(cov==="Cover 0"){
    recv.forEach((p,idx)=>push(p.x+(p.x<500?14:-14),p.y-26,"M",DB,"man",{manIdx:idx}));
    const rush=Math.max(0,7-nMan), xs=[500,452,548,476,524,428,572];
    for(let k=0;k<rush;k++) push(xs[k]||500, los-30, "B", RED, "rush");
  } else if(cov==="Cover 1"){
    recv.forEach((p,idx)=>push(p.x+(p.x<500?14:-14),p.y-26,"M",DB,"man",{manIdx:idx}));
    push(500,148,"FS",DB,"deep");
    const extra=Math.max(0,6-nMan);
    if(extra>0){ U(500,300,80,40); push(500,300,"R",LB,"zone"); }   /* robber / rat */
    for(let k=1;k<extra;k++) push(452+k*70, los-28, "B", RED, "rush");
  } else if(cov==="Cover 2"){
    Z(300,150,120,60,"½");Z(700,150,120,60,"½");
    U(150,288,80,40);U(850,288,80,40);U(400,300,78,40);U(500,300,78,40);U(600,300,78,40);
    push(300,158,"S",DB,"deep"); push(700,158,"S",DB,"deep");
    push(150,288,"C",DB,"zone"); push(850,288,"C",DB,"zone");
    push(400,300,"H",LB,"zone"); push(500,300,"M",LB,"zone"); push(600,300,"H",LB,"zone");
  } else if(cov==="Cover 3"){
    Z(230,150,110,58,"⅓");Z(500,140,110,58,"⅓");Z(770,150,110,58,"⅓");
    U(240,300,84,40);U(760,300,84,40);U(410,302,80,40);U(590,302,80,40);
    push(200,150,"C",DB,"deep"); push(500,140,"FS",DB,"deep"); push(800,150,"C",DB,"deep");
    push(240,300,"F",LB,"zone"); push(760,300,"F",LB,"zone"); push(410,302,"H",LB,"zone"); push(590,302,"H",LB,"zone");
  } else if(cov==="Cover 4"){
    Z(180,150,95,55,"¼");Z(400,148,95,55,"¼");Z(600,148,95,55,"¼");Z(820,150,95,55,"¼");
    U(280,300,88,40);U(500,305,88,40);U(720,300,88,40);
    push(180,158,"C",DB,"deep"); push(400,152,"S",DB,"deep"); push(600,152,"S",DB,"deep"); push(820,158,"C",DB,"deep");
    push(280,300,"N",LB,"zone"); push(500,305,"M",LB,"zone"); push(720,300,"N",LB,"zone");
  } else if(cov==="Tampa 2"){
    Z(300,150,115,58,"½");Z(700,150,115,58,"½");
    U(180,300,80,40);U(820,300,80,40);U(400,305,80,40);U(600,305,80,40);
    push(300,158,"S",DB,"deep"); push(700,158,"S",DB,"deep"); push(500,202,"M",LB,"deep");
    push(180,300,"F",DB,"zone"); push(820,300,"F",DB,"zone"); push(400,305,"H",LB,"zone"); push(600,305,"H",LB,"zone");
  }
  return {shade, defs};
}
function defStartY(d,los){
  if(d.kind==="dl"||d.kind==="man") return d.fy;
  if(d.kind==="rush") return los-28;
  const lab=d.lab||"";
  if(lab==="FS"||lab==="S") return los-115;   /* safeties ~10 yds */
  if(d.fill==="#123a6b") return los-75;       /* corners / DBs ~7 yds */
  return los-50;                              /* LBs / nickel ~4.5 yds */
}
function defPos(d,t,los,offPos){
  const e=easeIO(t);
  if(d.kind==="man" && d.manIdx!=null && offPos[d.manIdx]){
    const rp=offPos[d.manIdx];
    const align={x:d.fx, y:Math.min(d.fy, los-26)};              /* pre-snap: never on the offense's side */
    const track={x:rp.x+(rp.x<500?12:-12), y:rp.y-18};
    const k=Math.min(1, t*4);                                     /* close onto the man just after the snap */
    return {x:align.x+(track.x-align.x)*k, y:align.y+(track.y-align.y)*k};
  }
  if(d.kind==="rush"){ return {x:d.fx+(500-d.fx)*e, y:(los-28)+(440-(los-28))*e}; }
  if(d.kind==="dl"){ return {x:d.fx, y:d.fy-26*e}; }
  const sy=defStartY(d,los); return {x:d.fx, y:sy+(d.fy-sy)*e};
}

const OL_STUNTS=[["twistL","Twist ◄"],["twistR","Twist ►"],["mike","Mike A-gap"],["crossdog","Cross dog"],["clear","Clear stunts"]];
function applyStunt(state, cur, preset){
  cur.stunt = cur.stunt || {};

      cur.stunt[outside.i]=[{x: outside.d.x + (R?26:-26), y: outside.d.y-16, cx: outside.d.x + (R?30:-30), cy: outside.d.y-22},{x: inside.d.x, y: gy, cx: inside.d.x + (R?26:-26), cy: los}];

      cur.stunt[l.i]=[{x: cx+12, y: gy, cx: l.d.x, cy: los-6}];

let OLANIM=null;
function animateOlStunts(state, onDone, svgId, stunt){
  svgId=svgId||"field";
  if(OLANIM){ cancelAnimationFrame(OLANIM); OLANIM=null; }
  const defs=(state&&state.defs)||[];
  const paths=defs.map((d,i)=>{ const r=(stunt&&stunt[i])||d.route; return (r&&r.length)?flattenRoute(d.x,d.y,r):null; });
  const dur=1500, start=performance.now();

    defs.forEach((d,i)=>{ if(!paths[i]) return; const pt=along(paths[i],e); const g=document.querySelector('#'+svgId+' g[data-lab="ol_'+i+'"]'); if(g) g.setAttribute("transform","translate("+(pt.x-d.x)+" "+(pt.y-d.y)+")"); });

function answerOl(sel){

  const job=bp&&(bp.asn||bp.asnAuto);
  if(OLPHASE==="pre"){
    const k=rep.key, correct=scoreOl(k,sel);
    olReveal(k,sel);

    head=(overallCorrect?"✓ Correct":"✗ Not your man")+" — "+esc(rep.blocker)+": "+esc(rep._pre?rep._pre.answer:"");

  }
  fb.innerHTML="<h4>"+head+"</h4>"
    +(detail?("<div>"+detail+"</div>"):"")
    +(job?("<div><b>Your job on this play:</b> "+esc(job)+"</div>"):"")
    +((rep.play.ol&&rep.play.ol.note)?("<div class=\"prog\">"+esc(rep.play.ol.note)+"</div>"):"");
  const chose=(rep._pre?rep._pre.chose:"")+(single?"":(" / "+(post.postChose||"")));

  if(test) test.results.push({concept:rep.play.name+" — "+rep.blocker+(single?"":" (pre+stunt)"), coverage:(rep.play.state.front&&rep.play.state.front!=="none")?rep.play.state.front:"", correct:overallCorrect, chose:chose, answer:answer});

function pickRep(){
  const cs=pool().filter(c=>enabledConcepts.has(c.id));
  if(!cs.length) return null;
  for(let tries=0;tries<40;tries++){
    const c=cs[Math.floor(Math.random()*cs.length)];
    const covs=(c.custom?Object.keys(c.reads):COVERAGES).filter(cv=>enabledCoverages.has(cv));
    if(!covs.length) continue;
    const cov=covs[Math.floor(Math.random()*covs.length)];
    if(c.reads[cov]&&c.reads[cov].t){ const rd=c.reads[cov]; return {concept:c, coverage:cov, correct:rd.t, accept:[rd.t].concat(rd.alt||[])}; }

async function startTest(){

  if(TESTKIND==="protect"){
    await loadOlPlays();
    for(let k=0;k<n*6 && test.queue.length<n;k++){ const r=pickOlRep(); if(r) test.queue.push(r); }
    if(!test.queue.length){ alert(WEEKMODE?"None of this week's plan plays have OL keys yet — a coach places the front on the play (Playbook) and keys it under Author → OL keys.":"No plays with OL keys yet — a coach places the opponent's front on a play in the Playbook, then keys who blocks whom under Author → OL keys."); test=null; return; }

  if(TESTKIND==="routes"){
    await loadRoutePlays();
    if(!RQLABS.size) rqAllLabs().forEach(l=>RQLABS.add(l));
    for(let k=0;k<n*6 && test.queue.length<n;k++){ const r=pickRouteRep(); if(r) test.queue.push(r); }

const READY_MIN_TESTS=2, READY_AVG=0.8;

function readinessOf(rows){

}

  const mine=weekRowsOf(rows).filter(r=>r.user_id===uid);
  const st=readinessOf(mine); const due=weekDue();
  return '<div style="background:#eef5fc;border:1px solid #cfe0f3;border-radius:12px;padding:10px 14px;margin:0 0 16px">'
    +'<b style="color:var(--navy)">Your week vs '+esc(opp)+':</b> <span style="font-weight:800;color:'+READY_DOT[st.s]+'">● '+st.label+'</span>'
    +' <span class="tag">'+st.tests+' week test'+(st.tests===1?"":"s")+(st.tests?(' · avg '+Math.round(st.avg*100)+'%'):'')+(due?(' · '+esc(due)):'')+'</span>'
    +(st.s==="green"?'':' <span class="tag">— take tests with 🎯 Week mode on to go green ('+READY_MIN_TESTS+'+ tests at '+Math.round(READY_AVG*100)+'%+).</span>')
    +'</div>';
}
/* ---------- coach results ---------- */
async function showResults(){
  const rp=document.getElementById("resultPanel");
  rp.innerHTML='<p class="tag">Loading results…</p>';
  if(!(window.QB && window.QB.ready)){ rp.innerHTML='<p class="tag">Cloud not configured.</p>'; return; }
  let ctx; try{ ctx=await window.QB.context(); }catch(e){ ctx=null; }
  if(!ctx || !ctx.user){ rp.innerHTML='<p class="tag">Sign in (top-right) to see saved results.</p>'; return; }
  if(!ctx.team){ rp.innerHTML='<p class="tag">Join or create a program to track results.</p>'; return; }
  let data; try{ data=await window.QB.results(); }catch(e){ rp.innerHTML='<p class="tag">Could not load results: '+(e.message||e)+'</p>'; return; }
  const nameOf={}; (data.roster||[]).forEach(m=>nameOf[m.user_id]=m.full_name||m.email);
  const rows=data.rows||[];
  const coach=(ctx.role==="owner"||ctx.role==="coach_edit"||ctx.role==="coach");
  /* Phase C: make sure the active week plan is loaded, then build the readiness block */
  if(!WEEKPLAN && window.QB.weekContext){ try{ const wc=await window.QB.weekContext(); if(wc&&wc.plan){ WEEKPLAN=wc.plan; buildWeekSet(); renderWeekBar(); } }catch(e){} }
  const ready = coach ? readinessHTML(data.roster, rows) : myReadinessHTML(rows, ctx.user.id);
  if(!rows.length){ rp.innerHTML='<h3 style="margin:0 0 8px;color:var(--navy)">Results</h3>'+ready+'<p class="tag">No test results yet. Take a test in Test mode.</p>'; return; }
  rp.innerHTML=`<h3 style="margin:0 0 4px;color:var(--navy)">Results — ${ctx.team.name}</h3>
    <p class="tag">${coach?"Your whole roster’s scores.":"Your saved scores."}</p>`+ready+`
    <table class="res"><thead><tr><th>Player</th><th>Test</th><th>Score</th><th>%</th><th>When</th></tr></thead><tbody>`+
    rows.map(r=>{ const pct=r.total?Math.round(r.score/r.total*100):0; const when=new Date(r.created_at).toLocaleDateString();
      return `<tr><td>${(nameOf[r.user_id]||"—")}</td><td>${r.quiz||"Test"}</td><td>${r.score}/${r.total}</td><td>${pct}%</td><td>${when}</td></tr>`; }).join("")+
    `</tbody></table>`;
}

/* ---------- view switching ---------- */
function swap(view){
  document.getElementById("setupPanel").classList.toggle("hidden", view!=="setup");
  document.getElementById("playPanel").classList.toggle("hidden", view!=="play");
  document.getElementById("resultPanel").classList.toggle("hidden", view!=="result" && view!=="results");
  document.getElementById("authorPanel").classList.toggle("hidden", view!=="author");
}
function setMode(m){
  MODE=m;
  [].forEach.call(document.querySelectorAll("#modeSeg button"),b=>b.classList.toggle("on",b.dataset.mode===m));
  document.getElementById("testLenWrap").classList.toggle("hidden", m!=="test");
  document.getElementById("kindWrap").classList.toggle("hidden", m!=="test");
  document.getElementById("startBtn").textContent = m==="test" ? "Start test" : "Start training";
  if(m==="test") buildPosFilter();
  if(m==="results"){ swap("results"); showResults(); }
  else if(m==="author"){ swap("author"); loadAuthor(); }
  else swap("setup");
}

/* ---------- chips ---------- */
function buildChips(){
  const cc=document.getElementById("conceptChips"); cc.innerHTML="";
  pool().forEach(c=>{ const b=document.createElement("button"); b.className="chip"+(enabledConcepts.has(c.id)?" on":""); b.textContent=c.name; b.onclick=()=>{ if(enabledConcepts.has(c.id)&&enabledConcepts.size>1){enabledConcepts.delete(c.id);b.classList.remove("on");} else {enabledConcepts.add(c.id);b.classList.add("on");} }; cc.appendChild(b); });
  const vc=document.getElementById("coverageChips"); vc.innerHTML="";
  COVERAGES.forEach(cv=>{ const b=document.createElement("button"); b.className="chip"+(enabledCoverages.has(cv)?" on":""); b.textContent=cv; b.onclick=()=>{ if(enabledCoverages.has(cv)&&enabledCoverages.size>1){enabledCoverages.delete(cv);b.classList.remove("on");} else {enabledCoverages.add(cv);b.classList.add("on");} }; vc.appendChild(b); });
}

/* ---------- position drill-down ---------- */
const POSKINDS={QB:["reads","coverage","routes","protect"],RB:["routes","protect"],WR:["routes","coverage"],TE:["routes","protect"],OL:["protect"],DL:["protect"],LB:["coverage","protect"],DB:["coverage","routes"],ALL:["reads","coverage","routes","protect"]};
const POSLIST=["QB","RB","WR","TE","OL","DL","LB","DB"];
let POSFILTER="ALL";
function selectKind(kind){
  TESTKIND=kind;
  [].forEach.call(document.querySelectorAll("#kindSeg button"),x=>x.classList.toggle("on",x.dataset.kind===kind));
  const rq=(kind==="routes");
  const rw=document.getElementById("rqWrap"); if(rw) rw.classList.toggle("hidden",!rq);
  const NOTES={reads:"Where's the throw — read the coverage, snap, then pick the target.",coverage:"Name the coverage after you snap and read it.",routes:"Your Playbook plays — which route does each man run? (Concept/coverage filters don't apply.)",protect:"Who do you block? Coach places the front + keys it in Author → OL keys. (Filters don't apply.)"};
  const kn=document.getElementById("kindNote"); if(kn) kn.textContent=NOTES[kind]||"";
  if(rq){ loadRoutePlays().then(buildPosChips); }
}
function applyPosFilter(pos){
  POSFILTER=pos;
  [].forEach.call(document.querySelectorAll("#posFilter button"),b=>b.classList.toggle("on",b.dataset.pos===pos));
  const allowed=POSKINDS[pos]||POSKINDS.ALL;
  [].forEach.call(document.querySelectorAll("#kindSeg button"),b=>{ b.style.display = allowed.indexOf(b.dataset.kind)>=0 ? "" : "none"; });
  if(allowed.indexOf(TESTKIND)<0) selectKind(allowed[0]);
}
function buildPosFilter(){
  const host=document.getElementById("posFilter"); if(!host) return;
  let mine=""; try{ mine=(localStorage.getItem("offgrd_pos")||"").toUpperCase(); }catch(e){}
  host.innerHTML="";
  POSLIST.concat(["ALL"]).forEach(p=>{ const b=document.createElement("button"); b.className="chip"; b.dataset.pos=p; b.textContent=(p==="ALL"?"All":p)+(p===mine?" ★":""); b.onclick=()=>applyPosFilter(p); host.appendChild(b); });
  applyPosFilter((mine&&POSKINDS[mine])?mine:"ALL");
}
/* ---------- init ---------- */
function init(){
  buildChips();
  [].forEach.call(document.querySelectorAll("#modeSeg button"),b=>b.onclick=()=>setMode(b.dataset.mode));
  [].forEach.call(document.querySelectorAll("#srcSeg button"),b=>b.onclick=()=>setSource(b.dataset.src));
  document.getElementById("startBtn").onclick=()=>{ if(MODE==="test"){ startTest(); return; } const r=pickRep(); if(!r){ alert("No reps match your filters — enable a concept and coverage."); return; } swap("play"); showRep(r); document.getElementById("progressLbl").textContent="Train mode — read the defense, snap, then tap where the ball should go."; };
  document.getElementById("nextBtn").onclick=()=>{ if(MODE==="train"){ const r=pickRep(); if(r) showRep(r); } };
  document.getElementById("snapBtn").onclick=snapPlay;
  [].forEach.call(document.querySelectorAll("#kindSeg button"),b=>b.onclick=()=>selectKind(b.dataset.kind));
  buildPosFilter();
  document.getElementById("replayBtn").onclick=()=>{ if(isOlTest()){ animateOlStunts(rep.play.state, null, "field", rep.play.ol&&rep.play.ol.stunt); return; } if(SCENE && SNAPPED) animateScene(SCENE); };
  document.getElementById("quitBtn").onclick=()=>{ cancelQB(); test=null; setMode(MODE==="test"?"test":"train"); };
  document.getElementById("field").addEventListener("click",e=>{ const g=e.target.closest("[data-lab]"); if(!g) return; const L=g.dataset.lab; if(L&&L.indexOf("ol_")===0){ if(isOlTest()) answerOl({t:"def",di:parseInt(L.slice(3),10)}); return; } if(L&&L.indexOf("r_")===0&&isRouteTest()){ answerRoute(parseInt(L.slice(2),10)); } else answer(L); });
  window.OFFGRD_APP={kind:"qb"};
  initWeek();   /* Phase B: week-scoped tests once the cloud bridge is up */
  /* deep link from onboarding: drop straight into a first rep */
  if(location.hash==="#train"){ const r=pickRep(); if(r){ swap("play"); showRep(r); document.getElementById("progressLbl").textContent="Train mode — read the defense, snap, then tap where the ball should go."; } }
}
init();
</script>
